services:
  - type: web
    name: garment-erp-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: ACCESS_TOKEN_TTL
        value: "900"
      - key: REFRESH_TOKEN_TTL_ADMIN
        value: "28800"
      - key: REFRESH_TOKEN_TTL_MOBILE
        value: "604800"
      - key: REDIS_URL
        sync: false