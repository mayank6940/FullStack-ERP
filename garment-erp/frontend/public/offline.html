<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Garment ERP</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
        max-width: 420px;
        text-align: center;
      }
      h1 { font-size: 24px; margin: 0 0 8px; }
      p { font-size: 16px; margin: 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>No internet connection</h1>
      <p>Please reconnect and try again.</p>
    </div>
  </body>
</html>
