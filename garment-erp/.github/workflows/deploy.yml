name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (if available)
        run: |
          cd backend
          npm run lint --if-present
          cd ../frontend
          npm run lint --if-present

      - name: Test (if available)
        run: |
          cd backend
          npm test --if-present
          cd ../frontend
          npm test --if-present

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Backend syntax check
        working-directory: backend
        run: |
          node --check src/index.js
          node --check src/routes/order.js
          node --check src/routes/report.js
          node --check src/routes/admin.js

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/garment-erp
            git pull origin main

            cd backend
            npm ci --omit=dev
            npx prisma migrate deploy
            npx prisma generate
            pm2 restart garment-erp-backend || pm2 start src/index.js --name garment-erp-backend

            cd ../frontend
            npm ci
            npm run build

            echo "Deployment completed successfully"
